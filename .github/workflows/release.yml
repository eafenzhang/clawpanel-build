# ClawPanel 发布构建工作流
# 推送 v* 标签时自动构建 Windows 安装包并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  # ── Windows 构建 job ───────────────────────────────────────────────────────
  build:
    name: 构建 Windows
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置版本标签
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "TAG_NAME=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装前端依赖
        run: bun install

      - name: 同步版本号到构建产物
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          node scripts/sync-version.js "$VERSION"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 构建 Tauri 应用
        run: bun run tauri build
        timeout-minutes: 30

      - name: 上传安装包到 Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG_NAME#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          # 创建 Release
          gh release create "$TAG_NAME" \
            --title "ClawPanel $TAG_NAME" \
            --notes "ClawPanel $TAG_NAME Windows 安装包" \
            --draft=false

          # 上传 NSIS 安装包
          for f in "$BUNDLE_DIR"/nsis/*.exe; do
            if [ -f "$f" ]; then
              gh release upload "$TAG_NAME" "$f" --clobber
            fi
          done

          # 上传 MSI 安装包
          for f in "$BUNDLE_DIR"/msi/*.msi; do
            if [ -f "$f" ]; then
              gh release upload "$TAG_NAME" "$f" --clobber
            fi
          done

          # 上传独立可执行文件
          if [ -f "src-tauri/target/release/ClawPanel.exe" ]; then
            gh release upload "$TAG_NAME" "src-tauri/target/release/ClawPanel.exe" --clobber
          fi
